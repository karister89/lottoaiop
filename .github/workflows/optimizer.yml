name: 🧠 Auto Run Optimizer (God Parameters)

on:
  workflow_dispatch: # ปุ่มกดรันด้วยตัวเอง
  schedule:
    - cron: '15 1 * * 1-5'   # 08:15 เวลาไทย (ทำงานทุกเช้า จ.-ศ.)

jobs:
  optimize-settings:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์ Action ในการเซฟไฟล์กลับเข้า Repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # สำคัญ: สั่งให้บอทดึงประวัติไฟล์มาทั้งหมด เพื่อให้กันชนได้ 100%

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install gspread google-auth

      - name: Run Optimizer (หาค่า Win-Rate สูงสุด)
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python optimizer.py

      - name: Commit and Push Settings
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # เก็บกวาดไฟล์ทั้งหมดที่มีการอัปเดต (ครอบคลุมทั้ง JSON ทุกตัว)
          git add -A
          
          # ตรวจสอบว่ามีอะไรเปลี่ยนแปลงไหม ถ้ามีค่อยทำงานต่อ
          if ! git diff --staged --quiet; then
            git commit -m "Auto-tune: Updated Market Settings 🎯"
            
            # 🌟 จุดสำคัญ: ดึงข้อมูลที่บอทอีกตัวอาจจะเพิ่งอัปเดตไปลงมาก่อน
            git pull origin main --rebase
            
            # ส่งข้อมูลกลับขึ้น GitHub
            git push origin main
          else
            echo "ไม่มีการเปลี่ยนแปลงไฟล์ ข้ามการ Commit"
          fi

name: 🧠 Auto Run Optimizer (God Parameters)

on:
  workflow_dispatch: # ปุ่มกดรันด้วยตัวเอง
  schedule:
    - cron: '15 1 * * 1-5'   # 08:15 เวลาไทย (ทำงานทุกเช้า จ.-ศ.)

jobs:
  optimize-settings:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์ Action ในการเซฟไฟล์กลับเข้า Repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install gspread google-auth

      - name: Run Optimizer (หาค่า Win-Rate สูงสุด)
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python optimizer.py

      - name: Commit and Push Settings
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add market_settings.json
          # เช็กเฉพาะไฟล์ที่ Add ว่าเปลี่ยนไหม ถ้าเปลี่ยนค่อย Commit
          git diff --staged --quiet || git commit -m "Auto-tune: Updated Market Settings 🎯"
          git push

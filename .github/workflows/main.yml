name: Sovereign V3 Daily Operation (Strict Mode)

on:
  schedule:
    - cron: '15 1 * * *' # รันทุกวันเวลา 01:15 น. (เวลาเดิมเป๊ะ)
  workflow_dispatch: # กดรันเองได้

jobs:
  run-sovereign-bots:
    runs-on: ubuntu-latest
    permissions:
      contents: write # สำคัญ: เพื่อให้บอท Push ข้อมูลกลับเข้าเครื่องได้
    
    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4 # อัปเดตเป็น v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5 # อัปเดตเป็น v5 แก้ Error ที่เคยเจอ
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas gspread oauth2client || { echo "❌ Install failed"; exit 1; }

      - name: 🧹 0. ล้างและเตรียมโฟลเดอร์ data
        run: |
          mkdir -p data/
          touch data/.gitkeep
          echo "✅ เตรียมโฟลเดอร์ data/ พร้อมรบ!"

      - name: 📡 0.5 ดึงข้อมูลดิบชุดใหม่ (Fetch Raw Data)
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          python engines/ql_fetcher.py || { echo "❌ Fetcher พัง!"; exit 1; }

      - name: 🛡️ 1. สร้างไม้บรรทัดความเสี่ยง (Risk Tuner)
        run: |
          python engines/sp_risk_tuner.py || { echo "❌ Risk Tuner พัง!"; exit 1; }

      - name: 🤖 2. รันบอทวิเคราะห์ทั้ง 4 สาย
        run: |
          python engines/sp_market.py
          python engines/sp_stat.py
          python engines/sp_math.py
          python engines/sp_ai.py || { echo "❌ บอทวิเคราะห์พัง!"; exit 1; }

      - name: ⚖️ 3. ประเมินผลงานและให้คะแนน (Weight Eval)
        run: |
          python engines/core_weight_eval.py || { echo "❌ Weight Eval พัง!"; exit 1; }

      - name: 🗳️ 4. รวบรวมผลโหวต (Consensus Aggregator)
        run: |
          python engines/core_consensus_aggregator.py || { echo "❌ Aggregator พัง!"; exit 1; }

      - name: ⚔️ 5. คัดเลือกคู่เลข หน้า-หลัง (Pair Optimizer)
        run: |
          python engines/core_pair_optimizer.py || { echo "❌ Optimizer พัง!"; exit 1; }

      - name: 💰 6. สรุปบัญชี Dashboard (Money Commander)
        run: |
          python engines/core_money_commander.py || { echo "❌ Money Commander พัง!"; exit 1; }

      - name: 💾 7. Commit & Push Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # ตรวจสอบไฟล์สรุปผลก่อน Commit เพื่อความปลอดภัย
          if [ -f data/final_synergy.json ]; then
            git add data/*.json
            git commit -m "🤖 Auto-Update Sovereign V3: 15/30/60/90/100 Days Portfolio" || echo "No changes"
            git push
          else
            echo "❌ CRITICAL: ไม่พบไฟล์ final_synergy.json! หยุดการ Push ทันที"
            exit 1
          fi

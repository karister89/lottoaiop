name: Sovereign V3 Daily Operation

on:
  schedule:
    - cron: '15 1 * * *' 
  workflow_dispatch: 

jobs:
  run-sovereign-bots:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas gspread oauth2client

      - name: 🧹 0. ล้างและเตรียมโฟลเดอร์ data
        run: |
          rm -rf data/
          mkdir -p data/
          touch data/.gitkeep
          echo "✅ เตรียมโฟลเดอร์ data/ พร้อมรบ!"

      - name: 📡 0.5 ดึงข้อมูลดิบชุดใหม่ (Fetch Raw Data)
        run: python engines/ql_fetcher.py 

      - name: 🛡️ 1. สร้างไม้บรรทัดความเสี่ยง (Risk Tuner)
        run: python engines/sp_risk_tuner.py

      - name: 🤖 2. รันบอทวิเคราะห์ทั้ง 4 สาย (Analysts)
        run: |
          python engines/sp_market.py
          python engines/sp_stat.py
          python engines/sp_math.py
          python engines/sp_ai.py

      - name: ⚖️ 3. ประเมินผลงานและให้คะแนนความเก่ง (Weight Eval)
        run: python engines/core_weight_eval.py

      - name: 🗳️ 4. รวบรวมผลโหวตตามน้ำหนัก (Consensus Aggregator)
        run: python engines/core_consensus_aggregator.py

      - name: ⚔️ 5. แม่ทัพคัดเลือกคู่เลข หน้า-หลัง (Pair Optimizer)
        run: python engines/core_pair_optimizer.py

      - name: 💰 6. กุนซือเงินสรุปบัญชีและจัดพอร์ต (Money Commander)
        run: python engines/core_money_commander.py

      - name: 💾 7. Commit & Push Data to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # เช็คว่ามีไฟล์ .json เกิดขึ้นจริงไหมก่อนจะดันขึ้น GitHub
          if ls data/*.json 1> /dev/null 2>&1; then
            git add data/*.json
            git commit -m "🤖 อัปเดต Sovereign V3 (New Data Structure)"
            git push
          else
            echo "❌ Error: บอทรันจบแต่ไม่มีไฟล์ .json ถูกสร้างขึ้น! ตรวจสอบ Path ในโค้ด Python ด่วน"
            exit 1
          fi

name: Stock Full Digit Permutation Test (Embedded)

on:
  workflow_dispatch:

jobs:
  full-permutation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy gspread oauth2client google-auth

      - name: Prepare folders
        run: |
          mkdir -p data engines
          touch data/.gitkeep

      - name: Write stock_full_permutation.py from embedded base64
        run: |
          echo  | base64 -d > engines/stock_full_permutation.py
          wc -l engines/stock_full_permutation.py
          python -c "import ast; ast.parse(open('engines/stock_full_permutation.py').read()); print('Syntax OK')"

      - name: Fetch Raw Data from Google Sheets
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          python engines/ql_fetcher.py

      - name: Run Full Permutation Analysis
        run: |
          python engines/stock_full_permutation.py

      - name: Commit and Push report
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/stock_full_permutation_report.json data/raw_*.json engines/stock_full_permutation.py 2>/dev/null || true
          git commit -m "Stock full digit permutation analysis" || echo "No changes"
          git push || echo "Nothing to push"

name: 🧠 Auto Run Sovereign Optimizer (God Parameters)

on:
  workflow_dispatch: # ปุ่มกดรันด้วยตัวเอง
  schedule:
    # เวลาสากล (UTC) ช้ากว่าไทย 7 ชม. / 01:15 UTC = 08:15 เวลาไทย
    - cron: '15 1 * * 1-5'   # ทำงานทุกเช้า จ.-ศ. เพื่อสรุปกลยุทธ์ที่ดีที่สุด

jobs:
  optimize-settings:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์ Action ในการเซฟไฟล์กลับเข้า Repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ดึงประวัติไฟล์มาทั้งหมดเพื่อป้องกัน Conflict เวลา Rebase

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install gspread google-auth
          # เพิ่มไลบรารีอื่นหากมีการใช้งานในอนาคต

      - name: Run Optimizer Engine (Deep Grid Search)
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python engine_optimizer.py # เปลี่ยนชื่อไฟล์ให้ตรงกับที่พี่เปลี่ยนล่าสุด

      - name: Commit and Push Settings
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # เก็บกวาดไฟล์ทั้งหมดที่มีการอัปเดต (โดยเฉพาะ config_markets.json)
          git add -A
          
          # ตรวจสอบว่ามีการอัปเดตพารามิเตอร์ใหม่ไหม
          if ! git diff --staged --quiet; then
            git commit -m "Auto-tune: Updated SOVEREIGN Engine Settings 🎯"
            
            # ดึงข้อมูลล่าสุดลงมาก่อน (Rebase เพื่อรักษาลำดับเหตุการณ์)
            git pull origin main --rebase
            
            # ส่งค่า Settings ที่ดีที่สุดกลับขึ้น GitHub
            git push origin main
          else
            echo "ไม่มีการเปลี่ยนแปลงค่าพารามิเตอร์ ข้ามการ Commit"
          fi

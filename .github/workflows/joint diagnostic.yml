name: Joint Diagnostic Test (Embedded)

on:
  workflow_dispatch:

jobs:
  joint-diagnostic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy gspread oauth2client google-auth

      - name: Prepare folders
        run: |
          mkdir -p data engines
          touch data/.gitkeep

      - name: Write joint_diagnostic.py from embedded base64
        run: |
          echo  | base64 -d > engines/joint_diagnostic.py
          wc -l engines/joint_diagnostic.py
          python -c "import ast; ast.parse(open('engines/joint_diagnostic.py').read()); print('Syntax OK')"

      - name: Fetch Raw Data from Google Sheets
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          python engines/ql_fetcher.py

      - name: Run Joint Diagnostic Battery
        run: |
          python engines/joint_diagnostic.py

      - name: Commit and Push report
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/joint_diagnostic_report.json data/raw_*.json engines/joint_diagnostic.py 2>/dev/null || true
          git commit -m "Joint diagnostic battery" || echo "No changes"
          git push || echo "Nothing to push"

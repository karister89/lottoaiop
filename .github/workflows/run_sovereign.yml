name: Sovereign V3 Auto-Run Pipeline (Clean & Split Edition)

on:
  schedule:
    - cron: '15 1 * * 1-6'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-sovereign-ai:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 1. Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ 2. Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy gspread oauth2client google-auth

      # 🧹 จุดที่เพิ่มใหม่: ล้างไฟล์เก่าทิ้งก่อนเริ่มรัน
      - name: 🧼 4. Clear Old Data (Keep .gitkeep)
        run: |
          echo "🧹 Cleaning data directory..."
          # ลบทุกไฟล์ใน data/ ยกเว้น .gitkeep
          find data/ -type f ! -name '.gitkeep' -delete
          echo "✅ Data directory is clean!"

      - name: 🚀 5. Phase 1 - Fetch Data (ทัพหน้า)
        working-directory: ./engines
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python ql_fetcher.py

      - name: ⚖️ 6. Phase 2 - Risk Tuner (ฝ่ายเสนาธิการ)
        working-directory: ./engines
        run: python sp_risk_tuner.py

      - name: 🧠 7. Phase 3 - Specialists (4 ทหารเสือ วิเคราะห์แยกตำแหน่ง)
        working-directory: ./engines
        run: |
          python sp_market.py &
          python sp_stat.py &
          python sp_math.py &
          python sp_ai.py &
          wait

      - name: 👑 8. Phase 4 - Core Command (รวมผลโหวตและตัดสินใจ)
        working-directory: ./engines
        run: |
          # 1. รันตัวรวมคะแนนโหวต (Aggregator) 
          python core_consensus_aggregator.py 
          # 2. คัดคู่เลขที่ดีที่สุดแยกหน้า-หลัง
          python core_pair_optimizer.py
          # 3. คำนวณเงินและแผนการเล่น
          python core_money_commander.py

      - name: 💾 9. Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          # ถ้าไม่มีอะไรเปลี่ยนแปลงไม่ต้องทำอะไร แต่ถ้ามีให้ Commit ทันที
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Sovereign V3: Auto-Update (Data Cleared)" && git push)

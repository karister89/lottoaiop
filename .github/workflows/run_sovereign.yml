name: Sovereign V3 Auto-Run Pipeline

on:
  # ⏰ 1. สั่งรันอัตโนมัติตามเวลา (Cron Job)
  schedule:
    # 08:15 น. เวลาไทย (01:15 UTC) ทุกวันจันทร์ถึงเสาร์ (1-6)
    - cron: '15 1 * * 1-6'
    
  # 🔘 2. เปิดปุ่มให้กดรันแบบ Manual บน GitHub ได้ตลอดเวลา
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-sovereign-ai:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 1. Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ 2. Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy
          # ถ้ามีไลบรารีอื่น เช่น gspread ให้ใส่เพิ่มตรงนี้

      - name: 🚀 4. Phase 1 - Fetch Data (ทัพหน้า)
        working-directory: ./engines
        run: python ql_fetcher.py

      - name: ⚖️ 5. Phase 2 - Risk Tuner (ฝ่ายเสนาธิการ)
        working-directory: ./engines
        run: python sp_risk_tuner.py

      - name: 🧠 6. Phase 3 - Specialists (4 ทหารเสือ)
        working-directory: ./engines
        run: |
          python sp_market.py
          python sp_stat.py
          python sp_math.py
          python sp_ai.py

      - name: 👑 7. Phase 4 - Core Command (กุนซือใหญ่)
        working-directory: ./engines
        run: |
          python core_weight_eval.py
          python core_pair_optimizer.py
          python core_money_commander.py

      - name: 💾 8. Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Sovereign V3: Auto-Update (Mon-Sat 08:15)" && git push)

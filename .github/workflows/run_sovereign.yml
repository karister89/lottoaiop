name: Sovereign V3 Auto-Run Pipeline
on:
schedule:
- cron: '15 1 * * 1-6'
workflow_dispatch:
permissions:
contents: write
jobs:
run-sovereign-ai:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: '3.10'
- name: Install Dependencies
run: |
python -m pip install --upgrade pip
pip install pandas numpy gspread oauth2client google-auth
- name: Phase 1 - Fetch
working-directory: ./engines
run: python ql_fetcher.py
- name: Phase 2 - Risk
working-directory: ./engines
run: python sp_risk_tuner.py
- name: Phase 3 - Specialists
working-directory: ./engines
run: |
python sp_market.py
python sp_stat.py
python sp_math.py
python sp_ai.py
- name: Phase 4 - Core
working-directory: ./engines
run: |
python core_weight_eval.py
python core_pair_optimizer.py
python core_money_commander.py
- name: Commit Results
run: |
git config --global user.name "github-actions[bot]"
git config --global user.email "github-actions[bot]@users.noreply.github.com"
git add data/*.json
git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Sovereign V3:
Auto-Update" && git push

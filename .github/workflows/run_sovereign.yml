name: Sovereign V3 Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1-5' 

permissions:
  contents: write

jobs:
  execute-sovereign:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        # 🛠️ เจมจัดเต็มไลบรารี Data/AI (numpy, pandas, scipy, scikit-learn) ให้ครบเลย จะได้ไม่ Error อีกครับ
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth numpy pandas scipy scikit-learn
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 📂 1. Run Data Fetcher (QL)
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python engines/ql_fetcher.py

      - name: ⚖️ 2. Run Risk Tuner (Standard P80)
        run: python engines/sp_risk_tuner.py

      - name: 🧠 3. Run Specialists (SP) แบบคู่ขนาน (Parallel)
        run: |
          python engines/sp_market.py &
          python engines/sp_stat.py &
          python engines/sp_math.py &
          python engines/sp_ai.py &
          wait


      - name: 👑 4. Run Core Command (CORE)
        run: |
          python engines/core_weight_eval.py
          python engines/core_pair_optimizer.py
          python engines/core_money_commander.py

      - name: 💾 5. Commit & Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add เฉพาะโฟลเดอร์ data 
          git add data/*.json
          
          # Commit และ Push กลับเข้า Repo
          git commit -m "🤖 Auto-update Sovereign V3 data" || echo "✅ No data changes to commit"
          git push

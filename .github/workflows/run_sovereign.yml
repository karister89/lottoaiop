name: Sovereign V3 Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1-5' 

permissions:
  contents: write

jobs:
  execute-sovereign:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth numpy pandas scipy scikit-learn
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ⚠️ สั่งให้บอทเดินเข้าไปในโฟลเดอร์ engines ก่อนรันเสมอ
      - name: 📂 1. Run Data Fetcher (QL)
        working-directory: ./engines
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python ql_fetcher.py

      - name: ⚖️ 2. Run Risk Tuner (Standard P80)
        working-directory: ./engines
        run: python sp_risk_tuner.py

      - name: 🧠 3. Run Specialists (SP) แบบคู่ขนาน
        working-directory: ./engines
        run: |
          python sp_market.py &
          python sp_stat.py &
          python sp_math.py &
          python sp_ai.py &
          wait

      - name: 👑 4. Run Core Command (CORE)
        working-directory: ./engines
        run: |
          python core_weight_eval.py
          python core_pair_optimizer.py
          python core_money_commander.py

      - name: 💾 5. Commit & Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # เปลี่ยนเป็นแอดโฟลเดอร์ data/ ทั้งหมด และใส่ || true ดักไว้ไม่ให้มัน Error ถ้าไฟล์ไม่เปลี่ยน
          git add data/ || true
          
          git commit -m "🤖 Auto-update Sovereign V3 data" || echo "✅ No data changes to commit"
          git push

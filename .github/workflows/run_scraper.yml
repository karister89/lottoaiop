name: 🚀 Auto Update Lottery Data (Scraper)

on:
  workflow_dispatch: # ปุ่มสำหรับกดรันเอง
  schedule:
    # เวลาสากล (UTC) ช้ากว่าไทย 7 ชม. / รันเฉพาะ จันทร์-ศุกร์ (1-5)
    - cron: '55 0 * * 1-5'   # 07:55 เวลาไทย
    - cron: '55 4 * * 1-5'   # 11:55 เวลาไทย
    - cron: '35 9 * * 1-5'   # 16:35 เวลาไทย
    - cron: '35 14 * * 1-5'  # 21:35 เวลาไทย

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์เขียนไฟล์กลับเข้า Repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # สำคัญ: สั่งให้บอทดึงประวัติไฟล์มาทั้งหมด เพื่อให้กันชนได้ 100%

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install gspread google-auth

      - name: Run Scraper
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python scraper.py

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # เก็บกวาดไฟล์ทั้งหมดที่มีการอัปเดต (ครอบคลุมทั้ง dashboard_data.json และ lottery-data.json)
          git add -A
          
          # ตรวจสอบว่ามีการเปลี่ยนแปลงไหม ถ้ามีค่อยทำงานต่อ
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: SOVEREIGN Data ⚡"
            
            # 🌟 จุดสำคัญ: ดึงข้อมูลที่บอทอีกตัวอาจจะเพิ่งอัปเดตไปลงมาก่อนเพื่อป้องกัน Error
            git pull origin main --rebase
            
            # ส่งข้อมูลกลับขึ้น GitHub
            git push origin main
          else
            echo "ไม่มีการเปลี่ยนแปลงไฟล์ ข้ามการ Commit"
          fi

name: 🚀 Auto Update Sovereign Data (Engine Scraper)

on:
  workflow_dispatch: # ปุ่มสำหรับกดรันเอง
  schedule:
    # เวลาสากล (UTC) ช้ากว่าไทย 7 ชม. / รันเฉพาะ จันทร์-ศุกร์ (1-5)
    - cron: '55 0 * * 1-5'   # 07:55 เวลาไทย
    - cron: '55 4 * * 1-5'   # 11:55 เวลาไทย
    - cron: '35 9 * * 1-5'   # 16:35 เวลาไทย
    - cron: '35 14 * * 1-5'  # 21:35 เวลาไทย

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์เขียนไฟล์กลับเข้า Repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ดึงประวัติไฟล์ทั้งหมด เพื่อป้องกัน Conflict เวลา Push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install gspread google-auth

      - name: Run Scraper Engine
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python engine_scraper.py # เปลี่ยนชื่อไฟล์ที่สั่งรันให้ตรงกับของใหม่

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # ใช้ -A เพื่อเก็บทุกไฟล์ที่มีการเปลี่ยนแปลง (data_raw.json, data_dashboard.json)
          git add -A
          
          # ตรวจสอบว่ามีการเปลี่ยนแปลงจริงไหมก่อน Commit
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: SOVEREIGN Data Sync ⚡"
            
            # Pull ข้อมูลล่าสุดลงมาก่อนเผื่อมีการทับซ้อน (Rebase เพื่อให้ประวัติสวยงาม)
            git pull origin main --rebase
            
            # ส่งข้อมูลกลับขึ้น GitHub
            git push origin main
          else
            echo "ไม่มีการเปลี่ยนแปลงไฟล์ ข้ามการ Commit"
          fi

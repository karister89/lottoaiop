<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign V3 - Market Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        .win-row { background: rgba(34, 197, 94, 0.1); }
        .miss-row { background: rgba(239, 68, 68, 0.05); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto flex justify-between items-center mb-8">
        <a href="index.html" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-bold transition">← กลับหน้าหลัก</a>
        <div class="text-right">
            <h1 id="market-name" class="text-4xl font-black text-white uppercase tracking-tighter">LOADING...</h1>
            <p class="text-xs font-bold text-slate-400">ANALYZING 100-DAY DATA</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-6">
            <div class="glass-card p-6 border-t-4 border-t-indigo-500">
                <h2 class="text-lg font-bold mb-4">🎯 เลขเด่นปัจจุบัน (Sniper)</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center p-3 bg-black/40 rounded-xl border border-white/5">
                        <p class="text-[10px] text-slate-400 mb-1 uppercase">รูดหน้า</p>
                        <p id="f-pair" class="text-3xl font-black text-yellow-400">--</p>
                    </div>
                    <div class="text-center p-3 bg-black/40 rounded-xl border border-white/5">
                        <p class="text-[10px] text-slate-400 mb-1 uppercase">รูดหลัง</p>
                        <p id="b-pair" class="text-3xl font-black text-emerald-400">--</p>
                    </div>
                </div>
            </div>
            <div class="glass-card p-6">
                <h2 class="text-lg font-bold mb-4">📊 สถิติรวม 100 วัน</h2>
                <div class="space-y-4 text-sm">
                    <div class="flex justify-between border-b border-white/5 pb-2"><span>กำไรสุทธิ</span><span id="stat-profit" class="font-bold">--</span></div>
                    <div class="flex justify-between border-b border-white/5 pb-2"><span>ความแม่นยำ</span><span id="stat-wr" class="font-bold text-blue-400">--</span></div>
                    <div class="flex justify-between border-b border-white/5 pb-2"><span>ชนะ / ทั้งหมด</span><span id="stat-count" class="font-bold text-slate-200">--</span></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="glass-card p-6">
                <h2 class="text-lg font-bold mb-4">📈 กราฟกำไรสะสม (Cumulative Profit)</h2>
                <canvas id="profitChart" height="180"></canvas>
            </div>
        </div>

        <div class="lg:col-span-3 glass-card overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h2 class="text-lg font-bold">📜 บันทึกสมรภูมิย้อนหลัง 100 งวด</h2>
            </div>
            <div class="overflow-x-auto max-h-[500px]">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 sticky top-0 backdrop-blur-md">
                        <tr class="text-[11px] text-slate-400 uppercase tracking-widest">
                            <th class="p-4">วันที่</th>
                            <th class="p-4">ผลหวย</th>
                            <th class="p-4 text-center">หน้า</th>
                            <th class="p-4 text-center">หลัง</th>
                            <th class="p-4 text-right">กำไรสุทธิ</th>
                        </tr>
                    </thead>
                    <tbody id="log-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const marketName = urlParams.get('m')?.toUpperCase() || 'NIKKEI';
        const PAYOUT = 100;
        const COST = 40;

        async function loadDetail() {
            try {
                const resSyn = await fetch('data/final_synergy.json');
                const synData = await resSyn.json();
                const mInfo = synData.markets[marketName];
                if (!mInfo) throw new Error("ไม่พบข้อมูล");

                document.getElementById('market-name').innerText = marketName;
                document.getElementById('f-pair').innerText = mInfo.front.pair.join(',');
                document.getElementById('b-pair').innerText = mInfo.back.pair.join(',');

                const resRaw = await fetch(`data/raw_${marketName.toLowerCase()}.json`);
                const rawData = await resRaw.json();
                const history = rawData.slice(0, 100).reverse();

                let currentProfit = 0;
                let wins = 0;
                let profitData = [];
                let labels = [];
                const tableBody = document.getElementById('log-table');

                history.forEach((row, index) => {
                    const draw = String(row.twoTop).padStart(2, '0');
                    const fp = mInfo.front.pair.map(String);
                    const bp = mInfo.back.pair.map(String);
                    
                    const fHit = fp.includes(draw[0]);
                    const bHit = bp.includes(draw[1]);
                    const hit = fHit || bHit;
                    if(hit) wins++;

                    let roundProfit = -COST;
                    if(fHit) roundProfit += PAYOUT;
                    if(bHit) roundProfit += PAYOUT;

                    currentProfit += roundProfit;
                    profitData.push(currentProfit);
                    labels.push(row.date);

                    const tr = document.createElement('tr');
                    tr.className = `border-b border-white/5 text-sm ${hit ? 'win-row' : 'miss-row'}`;
                    tr.innerHTML = `
                        <td class="p-4 text-slate-400">${row.date}</td>
                        <td class="p-4 font-mono font-bold">${draw}</td>
                        <td class="p-4 text-center">${fHit ? '✅' : '❌'}</td>
                        <td class="p-4 text-center">${bHit ? '✅' : '❌'}</td>
                        <td class="p-4 text-right font-bold ${roundProfit > 0 ? 'text-green-400' : 'text-red-400'}">${roundProfit > 0 ? '+' : ''}${roundProfit} ฿</td>
                    `;
                    tableBody.prepend(tr);
                });

                document.getElementById('stat-profit').innerText = currentProfit.toLocaleString() + " ฿";
                document.getElementById('stat-profit').className = `font-bold text-xl ${currentProfit >= 0 ? 'text-green-400' : 'text-red-400'}`;
                document.getElementById('stat-wr').innerText = ((wins / history.length) * 100).toFixed(1) + "%";
                document.getElementById('stat-count').innerText = `${wins} / ${history.length} งวด`;

                new Chart(document.getElementById('profitChart'), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{ label: 'Profit', data: profitData, borderColor: '#6366f1', backgroundColor: 'rgba(99, 102, 241, 0.1)', fill: true, tension: 0.3, pointRadius: 0 }]
                    },
                    options: { responsive: true, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { display: false } }, plugins: { legend: { display: false } } }
                });
            } catch (e) { console.error(e); }
        }
        loadDetail();
    </script>
</body>
</html>

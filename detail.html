<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Analysis - Sovereign Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <a href="index.html" class="inline-block mb-6 text-slate-400 hover:text-white transition-colors">← Back to Dashboard</a>
        
        <div id="detail-content">
            <!-- Content will be injected here -->
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const marketKey = urlParams.get('m');

        async function loadDetail() {
            if(!marketKey) return;
            try {
                const res = await fetch('data_dashboard.json');
                const data = await res.json();
                const m = data.summary[marketKey];

                if(!m) return;

                let html = `
                    <div class="flex justify-between items-end mb-8">
                        <h1 class="text-4xl font-bold uppercase">${marketKey}</h1>
                        <div class="text-right">
                            <div class="text-sm text-slate-400">Current Signal</div>
                            <div class="text-2xl font-bold ${m.sigT === 'GREEN' ? 'text-emerald-400' : 'text-yellow-400'}">${m.sigT}</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        ${[30, 60, 90].map(d => `
                            <div class="card p-4 text-center">
                                <div class="text-xs text-slate-400 mb-1">${d} Days Profit</div>
                                <div class="text-xl font-bold text-emerald-400">${m.stats[d].profit.toLocaleString()}</div>
                                <div class="text-xs text-slate-500">WR: ${m.stats[d].winrate}%</div>
                            </div>
                        `).join('')}
                    </div>

                    <h3 class="text-xl font-semibold mb-4">Last 10 Draws Analysis</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left card overflow-hidden">
                            <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
                                <tr>
                                    <th class="p-4">Date</th>
                                    <th class="p-4">Signal</th>
                                    <th class="p-4">Predicted (Top 5)</th>
                                    <th class="p-4">Result</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-700 text-sm">
                                ${m.ledger.map(row => {
                                    // แสดงผลเลขทำนายสูงสุด 5 ตัว
                                    const predHtml = row.top_digits.slice(0, 5).map((d, i) => `
                                        <span class="${row.isWinTop && row.winIndex === i ? 'text-emerald-400 font-bold underline' : 'text-slate-400'}">${d}</span>
                                    `).join(', ');

                                    return `
                                        <tr class="hover:bg-slate-800/50 transition-colors">
                                            <td class="p-4 text-slate-300">${row.date}</td>
                                            <td class="p-4">
                                                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-slate-900 ${row.sigT === 'GREEN' ? 'text-emerald-400' : 'text-yellow-400'}">
                                                    ${row.sigT}
                                                </span>
                                            </td>
                                            <td class="p-4 font-mono">${predHtml}</td>
                                            <td class="p-4">
                                                ${row.isWinTop ? '<span class="text-emerald-500 font-bold">WIN</span>' : '<span class="text-slate-600">MISS</span>'}
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;

                document.getElementById('detail-content').innerHTML = html;
            } catch (e) {
                console.error(e);
            }
        }
        loadDetail();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign V3 - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .next-round-bg { background: linear-gradient(180deg, #1e3a8a 0%, #1e293b 100%); }
        .stat-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .stat-table th { color: #94a3b8; font-weight: normal; padding: 4px; border-bottom: 1px solid #334155; }
        .stat-table td { padding: 6px 4px; text-align: center; }
        .pair-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto mb-8">
        <h1 class="text-2xl md:text-3xl font-bold text-white mb-4">🚀 Sovereign V3 Command Center</h1>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="card p-4 border-l-4 border-green-500">
                <p class="text-slate-400 text-xs">NET PROFIT (30D)</p>
                <h2 id="total-profit" class="text-2xl font-bold">กำลังคำนวณ...</h2>
            </div>
            <div class="card p-4 border-l-4 border-blue-500">
                <p class="text-slate-400 text-xs">AVG WIN-RATE</p>
                <h2 id="total-winrate" class="text-2xl font-bold">0%</h2>
            </div>
            <div class="card p-4 border-l-4 border-yellow-500">
                <p class="text-slate-400 text-xs">INVESTED</p>
                <h2 id="total-invested" class="text-2xl font-bold text-slate-300">0 ฿</h2>
            </div>
            <div class="card p-4 border-l-4 border-purple-500">
                <p class="text-slate-400 text-xs">LAST SYNC</p>
                <h2 id="last-sync" class="text-sm font-bold mt-2 text-slate-300">--:--</h2>
            </div>
        </div>
    </div>

    <div id="market-list" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        </div>

    <script>
        const marketOrder = ["TPE", "NIKKEI", "SHE", "HANGSENG", "SENSEX", "DAX", "FTSE", "DJI"];

        // ฟังก์ชันช่วยหาค่าเฉลี่ยและผลรวมระหว่าง Front และ Back
        function combineStats(frontStat, backStat) {
            return {
                profit: (frontStat?.profit || 0) + (backStat?.profit || 0),
                wins: (frontStat?.wins || 0) + (backStat?.wins || 0),
                invested: (frontStat?.invested || 0) + (backStat?.invested || 0),
                win_rate: (((frontStat?.win_rate || 0) + (backStat?.win_rate || 0)) / 2).toFixed(2)
            };
        }

        async function initDashboard() {
            try {
                // แก้ให้ชี้ไปที่ไฟล์ JSON ตัวจริงของพี่ (เปลี่ยนชื่อไฟล์ถ้าจำเป็น)
                const res = await fetch('data/final_synergy.json'); 
                if (!res.ok) throw new Error("โหลดไฟล์ไม่สำเร็จ");
                const data = await res.json();

                const container = document.getElementById('market-list');
                container.innerHTML = '';
                
                let sumProfit = data.portfolio["30d"].profit;
                let sumInvest = data.portfolio["30d"].invested;
                let sumWins = data.portfolio["30d"].wins;
                
                // คำนวณ Winrate รวม (จำนวนครั้งที่ชนะ / (8 ตลาด * 2 สมรภูมิ * 30 วัน))
                let avgWinrate = (sumWins / (8 * 2 * 30) * 100).toFixed(1);

                marketOrder.forEach(mKey => {
                    const m = data.markets[mKey];
                    if (!m) return;

                    const fHistory = m.front.history;
                    const bHistory = m.back.history;
                    
                    // รวมสถิติเพื่อโชว์ในตาราง
                    const stats15 = combineStats(fHistory["15d"], bHistory["15d"]);
                    const stats30 = combineStats(fHistory["30d"], bHistory["30d"]);
                    const stats60 = combineStats(fHistory["60d"], bHistory["60d"]);
                    const stats100 = combineStats(fHistory["100d"], bHistory["100d"]);

                    const marketHTML = `
                        <div class="card overflow-hidden">
                            <div class="next-round-bg p-4 border-b border-slate-700">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-xl font-black text-white">${mKey}</span>
                                    <span class="text-[10px] bg-indigo-500 px-2 py-0.5 rounded text-white shadow">พร้อมลุย</span>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-2 text-center">
                                    <div class="pair-box">
                                        <p class="text-[10px] text-slate-400 mb-1">รูดหน้า (Front)</p>
                                        <p class="text-2xl font-black text-yellow-400">
                                            ${m.front.pair[0]},${m.front.pair[1]}
                                        </p>
                                    </div>
                                    <div class="pair-box">
                                        <p class="text-[10px] text-slate-400 mb-1">รูดหลัง (Back)</p>
                                        <p class="text-2xl font-black text-emerald-400">
                                            ${m.back.pair[0]},${m.back.pair[1]}
                                        </p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="p-3 bg-slate-900/50">
                                <p class="text-[10px] text-slate-400 mb-2 font-bold uppercase tracking-wider text-center">📊 ผลรวมกำไร (หน้า+หลัง)</p>
                                <table class="stat-table">
                                    <thead>
                                        <tr>
                                            <th>ระยะ</th>
                                            <th>กำไร (฿)</th>
                                            <th>Win-Rate</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr class="bg-white/5">
                                            <td class="text-slate-400 font-bold">15 วัน</td>
                                            <td class="font-bold ${stats15.profit >= 0 ? 'text-green-400' : 'text-red-400'}">${stats15.profit > 0 ? '+' : ''}${stats15.profit}</td>
                                            <td class="text-blue-300 font-semibold">${stats15.win_rate}%</td>
                                        </tr>
                                        <tr>
                                            <td class="text-slate-500">30 วัน</td>
                                            <td class="font-bold ${stats30.profit >= 0 ? 'text-green-400' : 'text-red-400'}">${stats30.profit > 0 ? '+' : ''}${stats30.profit}</td>
                                            <td class="text-blue-300 font-semibold">${stats30.win_rate}%</td>
                                        </tr>
                                        <tr>
                                            <td class="text-slate-500">60 วัน</td>
                                            <td class="font-bold ${stats60.profit >= 0 ? 'text-green-400' : 'text-red-400'}">${stats60.profit > 0 ? '+' : ''}${stats60.profit}</td>
                                            <td class="text-blue-300 font-semibold">${stats60.win_rate}%</td>
                                        </tr>
                                        <tr>
                                            <td class="text-slate-500">100 วัน</td>
                                            <td class="font-bold ${stats100.profit >= 0 ? 'text-green-400' : 'text-red-400'}">${stats100.profit > 0 ? '+' : ''}${stats100.profit}</td>
                                            <td class="text-blue-300 font-semibold">${stats100.win_rate}%</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                    container.innerHTML += marketHTML;
                });

                // ดึงค่ายอดรวมจาก key "portfolio" มาโชว์
                document.getElementById('total-profit').innerText = sumProfit.toLocaleString() + " ฿";
                document.getElementById('total-profit').classList.add(sumProfit >= 0 ? 'text-green-400' : 'text-red-400');
                document.getElementById('total-invested').innerText = sumInvest.toLocaleString() + " ฿";
                document.getElementById('total-winrate').innerText = avgWinrate + "%";
                document.getElementById('last-sync').innerText = new Date().toLocaleTimeString('th-TH');

            } catch (err) {
                console.error("Data fetch error:", err);
                document.getElementById('market-list').innerHTML = `<div class="col-span-full text-center p-4 text-red-500">โหลดข้อมูลไม่สำเร็จ: ตรวจสอบว่ามีไฟล์ final_synergy.json (หรือชื่อไฟล์ที่ตรงกับโค้ด) ในโฟลเดอร์ data หรือไม่</div>`;
            }
        }

        initDashboard();
    </script>
</body>
</html>

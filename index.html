<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign V3 | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* เอฟเฟกต์ไฟกระพริบเบาๆ ให้ดูเป็นไซไฟ */
        .glow { box-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-3xl text-center mb-8 mt-4">
        <h1 class="text-3xl md:text-4xl font-bold tracking-widest text-blue-400 mb-2">
            <i class="fa-solid fa-crosshairs"></i> SOVEREIGN V3
        </h1>
        <p class="text-gray-400 text-sm tracking-wide">ALGORITHMIC TRADING COMMAND CENTER</p>
    </div>

    <div id="dashboard" class="w-full max-w-3xl bg-gray-800 rounded-xl shadow-2xl p-6 border border-gray-700 hidden">
        
        <div id="statusBar" class="w-full rounded-lg p-3 text-center font-bold text-lg mb-6 tracking-wide transition-colors duration-500">
            <span id="statusText"><i class="fa-solid fa-spinner fa-spin"></i> กำลังวิเคราะห์สถานะ...</span>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            
            <div class="col-span-2 bg-gray-700/50 rounded-lg p-4 flex flex-col items-center justify-center border border-gray-600">
                <span class="text-gray-400 text-sm mb-1">เป้าหมาย (OP Pair)</span>
                <span id="targetPair" class="text-5xl font-extrabold text-white tracking-widest">-</span>
            </div>

            <div class="col-span-2 bg-gray-700/50 rounded-lg p-4 flex flex-col items-center justify-center border border-gray-600">
                <span class="text-gray-400 text-sm mb-1">สัดส่วนลงทุน (Bet Size)</span>
                <span id="betSize" class="text-4xl font-bold text-blue-300">-</span>
            </div>

            <div class="col-span-2 bg-gray-700/50 rounded-lg p-4 flex flex-col items-center border border-gray-600">
                <span class="text-gray-400 text-sm mb-1"><i class="fa-solid fa-wallet"></i> กำไรสะสม (30 วัน)</span>
                <span id="profit" class="text-2xl font-bold text-green-400">-</span>
            </div>

            <div class="col-span-2 bg-gray-700/50 rounded-lg p-4 flex flex-col items-center border border-gray-600">
                <span class="text-gray-400 text-sm mb-1"><i class="fa-solid fa-chart-line"></i> ความแม่นยำ (Win Rate)</span>
                <span id="winRate" class="text-2xl font-bold text-purple-400">-</span>
            </div>

        </div>

        <div class="text-center text-xs text-gray-500 mt-4">
            * อัปเดตล่าสุด: <span id="lastUpdate">-</span><br>
            * ข้อมูลประเมินจากมาตรฐานตลาด P80 (<span id="marketThresh">-</span>)
        </div>
    </div>

    <div id="loading" class="flex flex-col items-center justify-center mt-20 text-gray-400">
        <i class="fa-solid fa-radar fa-spin text-4xl mb-4 text-blue-500"></i>
        <p>กำลังเชื่อมต่อสัญญาณจาก Core Commander...</p>
    </div>

    <script>
        // ใช้ Date.now() ต่อท้าย URL เพื่อป้องกันมือถือจำแคช (Cache Busting)
        const dataUrl = `data/final_synergy.json?t=${Date.now()}`;

        fetch(dataUrl)
            .then(response => {
                if (!response.ok) throw new Error("หาไฟล์ไม่เจอ (อาจจะยังรันบอทไม่เสร็จ)");
                return response.json();
            })
            .then(data => {
                // ซ่อน Loading แสดง Dashboard
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');

                // ใส่ข้อมูลลงหน้าเว็บ
                // แปลงรูปแบบอาร์เรย์ ["5", "8"] เป็น 5-8
                const pairStr = Array.isArray(data.pair) ? data.pair.join(' - ') : data.pair;
                document.getElementById('targetPair').innerText = pairStr;
                
                document.getElementById('betSize').innerText = data.bet_size;
                
                // เช็คกำไร ถ้าบวกให้เป็นสีเขียว ถ้าลบให้เป็นสีแดง
                const profitVal = parseFloat(data.details["30d_profit"]);
                const profitEl = document.getElementById('profit');
                profitEl.innerText = (profitVal > 0 ? "+" : "") + profitVal + " ฿";
                profitEl.className = profitVal > 0 ? "text-2xl font-bold text-green-400" : "text-2xl font-bold text-red-400";

                document.getElementById('winRate').innerText = data.details.win_rate;
                document.getElementById('marketThresh').innerText = data.details.market_threshold;
                
                // จัดการสี Status Bar
                const statusBar = document.getElementById('statusBar');
                const statusText = document.getElementById('statusText');
                
                if (data.report.includes("GREEN")) {
                    statusBar.className = "w-full rounded-lg p-3 text-center font-bold text-lg mb-6 bg-green-900/80 text-green-300 border border-green-500 glow text-green-500";
                    statusText.innerHTML = '<i class="fa-solid fa-circle-check"></i> SYSTEM STABLE: ตลาดเป็นใจ จัดเต็มได้เลย';
                } else if (data.report.includes("YELLOW")) {
                    statusBar.className = "w-full rounded-lg p-3 text-center font-bold text-lg mb-6 bg-yellow-900/80 text-yellow-300 border border-yellow-500 glow text-yellow-500";
                    statusText.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> WARNING: ตลาดเริ่มผันผวน ให้ลดไม้ลง';
                } else {
                    statusBar.className = "w-full rounded-lg p-3 text-center font-bold text-lg mb-6 bg-red-900/80 text-red-300 border border-red-500 glow text-red-500";
                    statusText.innerHTML = '<i class="fa-solid fa-skull-crossbones"></i> CRITICAL: อันตราย หยุดการลงทุน';
                }

                // เวลาอัปเดต
                const now = new Date();
                document.getElementById('lastUpdate').innerText = now.toLocaleString('th-TH');
            })
            .catch(error => {
                document.getElementById('loading').innerHTML = `<i class="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4"></i><p class="text-red-400">ระบบไม่สามารถดึงข้อมูลได้: ${error.message}</p>`;
            });
    </script>
</body>
</html>

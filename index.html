<div class="dashboard-container">
    <div class="header-section">
        <h2>🚀 Sovereign Portfolio Command Center</h2>
        <div class="time-tabs">
            <button class="tab-btn active" onclick="updateView('30d')">30 Days</button>
            <button class="tab-btn" onclick="updateView('60d')">60 Days</button>
            <button class="tab-btn" onclick="updateView('90d')">90 Days</button>
        </div>
    </div>

    <div class="summary-grid">
        <div class="card profit">
            <span class="label">NET PROFIT</span>
            <span id="total-profit" class="value">0.00 ฿</span>
        </div>
        <div class="card invested">
            <span class="label">INVESTED</span>
            <span id="total-invested" class="value">0.00 ฿</span>
        </div>
        <div class="card wins">
            <span class="label">TOTAL WINS</span>
            <span id="total-wins" class="value">0</span>
        </div>
        <div class="card winrate">
            <span class="label">WIN-RATE</span>
            <span id="avg-winrate" class="value">0%</span>
        </div>
    </div>
</div>

<script>
let dashboardData = {};

async function initDashboard() {
    const response = await fetch('data/final_synergy.json');
    dashboardData = await response.json();
    updateView('30d'); // เริ่มต้นที่ 30 วัน
}

function updateView(period) {
    // อัปเดตปุ่ม Active
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    const summary = dashboardData.portfolio[period];
    const winRate = (summary.wins / (summary.invested / 20) * 100).toFixed(2);

    // แสดงผลข้อมูลรวม
    document.getElementById('total-profit').innerText = summary.profit.toLocaleString() + " ฿";
    document.getElementById('total-invested').innerText = summary.invested.toLocaleString() + " ฿";
    document.getElementById('total-wins').innerText = summary.wins;
    document.getElementById('avg-winrate').innerText = winRate + "%";
    
    // อัปเดตรายชื่อตลาด (วนลูปสร้างตลาดตามข้อมูลที่มีใน dashboardData.markets)
    renderMarketCards(period);
}
// เรียกใช้เมื่อโหลดหน้า
initDashboard();
</script>

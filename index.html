<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Engine V2.5 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #475569; }
        .sig-GREEN { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.3); }
        .sig-YELLOW { color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.3); }
        .sig-RED { color: #f87171; }
        .btn-view { transition: all 0.2s; background: #334155; }
        .btn-view:hover { background: #475569; }
        .profit-pos { color: #4ade80; }
        .profit-neg { color: #f87171; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400">
                    SOVEREIGN ENGINE <span class="text-sm font-normal tracking-widest opacity-70">V2.5</span>
                </h1>
                <p class="text-slate-400 text-sm mt-1">อัปเดตล่าสุด: <span id="update-time" class="text-slate-200">-</span></p>
            </div>
            <div id="overall-stats" class="flex gap-4">
                <!-- ข้อมูลสรุปรวมจะแสดงตรงนี้ -->
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="market-grid">
            <!-- การ์ดแต่ละตลาดจะถูกสร้างที่นี่ -->
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('data_dashboard.json');
                const data = await res.json();
                
                // อัปเดตเวลา
                document.getElementById('update-time').innerText = new Date(data.generatedAt).toLocaleString('th-TH');

                // สรุปยอดรวม 90 วัน (กรองเอาเฉพาะกำไรที่เกิดขึ้นจริง)
                const over90 = data.overall["90"];
                const isPos = over90.profit >= 0;
                document.getElementById('overall-stats').innerHTML = `
                    <div class="card p-4 text-center min-w-[160px] border-b-4 ${isPos ? 'border-b-emerald-500' : 'border-b-red-500'}">
                        <div class="text-xs text-slate-400 uppercase tracking-tighter">Net Profit (90D)</div>
                        <div class="text-2xl font-bold ${isPos ? 'profit-pos' : 'profit-neg'}">
                            ${isPos ? '+' : ''}${over90.profit.toLocaleString()}
                        </div>
                    </div>
                `;

                const grid = document.getElementById('market-grid');
                grid.innerHTML = '';

                // วนลูปสร้างการ์ดรายตลาด
                for (const [key, m] of Object.entries(data.summary)) {
                    const stats = m.stats["90"];
                    const profitIsPos = stats.profit >= 0;
                    
                    // ดึงเฉพาะจำนวนตัวเลขตามที่ Optimizer หามาได้ (ถ้าไม่มีให้ใช้ 2)
                    // เราจะไม่โชว์พรวดเดียว 5 ตัวถ้าเราไม่ได้แทง 5 ตัวครับ
                    const displayCount = m.target_digits || 2; 
                    const digitsHtml = m.top_digits.slice(0, displayCount).map((d, i) => 
                        `<div class="flex flex-col items-center">
                            <span class="text-[10px] text-slate-500 mb-1">ไม้ ${i+1}</span>
                            <span class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-800 border border-slate-700 text-lg font-bold text-blue-400">
                                ${d}
                            </span>
                        </div>`
                    ).join('');

                    const card = document.createElement('div');
                    card.className = 'card p-6 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-6">
                                <h2 class="text-xl font-bold uppercase tracking-widest text-slate-100">${key}</h2>
                                <div class="flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full bg-${m.sigT === 'GREEN' ? 'emerald' : (m.sigT === 'YELLOW' ? 'yellow' : 'red')}-400 animate-pulse"></span>
                                    <span class="sig-${m.sigT} text-xs font-bold tracking-widest">${m.sigT}</span>
                                </div>
                            </div>
                            
                            <div class="mb-8">
                                <div class="text-[10px] uppercase text-slate-500 mb-3 tracking-widest font-semibold text-center">🎯 ตัวเลขแนะนำวันนี้ (รูด 19 ประตู)</div>
                                <div class="flex justify-center gap-4 italic">${digitsHtml}</div>
                            </div>

                            <div class="grid grid-cols-2 gap-4 py-4 border-t border-slate-700/50 text-sm">
                                <div>
                                    <div class="text-slate-500 text-[10px] uppercase">Win Rate</div>
                                    <div class="font-bold text-slate-200">${stats.winrate}%</div>
                                </div>
                                <div>
                                    <div class="text-slate-500 text-[10px] uppercase">Profit (90D)</div>
                                    <div class="font-bold ${profitIsPos ? 'text-emerald-400' : 'text-red-400'}">
                                        ${profitIsPos ? '+' : ''}${stats.profit.toLocaleString()}
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <a href="detail.html?m=${key}" class="btn-view w-full mt-4 py-3 rounded-xl text-center text-xs font-bold tracking-widest border border-slate-600 hover:border-blue-500/50 transition-all">
                            เจาะลึกสถิติรายวัน
                        </a>
                    `;
                    grid.appendChild(card);
                }
            } catch (e) {
                console.error("Load Error:", e);
                document.getElementById('market-grid').innerHTML = '<p class="text-red-400 col-span-full text-center">ยังไม่มีข้อมูล กรุณารัน Engine Scraper ก่อนครับ</p>';
            }
        }
        loadData();
    </script>
</body>
</html>

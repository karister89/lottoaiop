<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Engine V2.5 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
        .sig-GREEN { color: #4ade80; }
        .sig-YELLOW { color: #facc15; }
        .sig-RED { color: #f87171; }
        .btn-view { transition: all 0.2s; }
        .btn-view:hover { background: #334155; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    SOVEREIGN ENGINE <span class="text-sm font-light">V2.5</span>
                </h1>
                <p class="text-slate-400 text-sm">Last Update: <span id="update-time">-</span></p>
            </div>
            <div id="overall-stats" class="flex gap-4">
                <!-- Overall Stats 90 Days will be here -->
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="market-grid">
            <!-- Market Cards will be here -->
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                // เปลี่ยนไปดึงไฟล์ชื่อใหม่ที่เราตั้งไว้
                const res = await fetch('data_dashboard.json');
                const data = await res.json();
                
                document.getElementById('update-time').innerText = new Date(data.generatedAt).toLocaleString('th-TH');

                // Render Overall Stats (90 Days)
                const over90 = data.overall["90"];
                document.getElementById('overall-stats').innerHTML = `
                    <div class="card p-3 text-center min-w-[120px]">
                        <div class="text-xs text-slate-400">90D Profit</div>
                        <div class="text-xl font-bold text-emerald-400">${over90.profit.toLocaleString()}</div>
                    </div>
                `;

                const grid = document.getElementById('market-grid');
                grid.innerHTML = '';

                for (const [key, m] of Object.entries(data.summary)) {
                    const stats = m.stats["90"];
                    // รองรับการแสดงผลเลขรูดได้สูงสุด 5 ตัว
                    const digitsHtml = m.top_digits.slice(0, 5).map((d, i) => 
                        `<span class="px-2 py-1 rounded ${i === 0 ? 'bg-blue-500/20 text-blue-400 font-bold' : 'bg-slate-700 text-slate-300'}">${d}</span>`
                    ).join(' ');

                    const card = document.createElement('div');
                    card.className = 'card p-6 flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <h2 class="text-xl font-bold uppercase tracking-wider">${key}</h2>
                                <span class="sig-${m.sigT} font-bold">● ${m.sigT}</span>
                            </div>
                            <div class="mb-6">
                                <div class="text-xs text-slate-400 mb-2">Recommended Digits (Top 5)</div>
                                <div class="flex flex-wrap gap-2">${digitsHtml}</div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
                                <div>
                                    <div class="text-slate-400">Win Rate</div>
                                    <div class="font-semibold">${stats.winrate}%</div>
                                </div>
                                <div>
                                    <div class="text-slate-400">Net Profit</div>
                                    <div class="font-semibold text-emerald-400">+${stats.profit.toLocaleString()}</div>
                                </div>
                            </div>
                        </div>
                        <a href="detail.html?m=${key}" class="btn-view w-full py-2 rounded-lg bg-slate-800 text-center text-sm font-medium border border-slate-700">
                            VIEW ANALYSIS
                        </a>
                    `;
                    grid.appendChild(card);
                }
            } catch (e) {
                console.error("Load Error:", e);
            }
        }
        loadData();
    </script>
</body>
</html>

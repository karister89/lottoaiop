<div id="dashboard-container" class="grid-container">
    </div>

<script>
async function loadDashboard() {
    const response = await fetch('data/optimized_pairs.json');
    const data = await response.json();
    const container = document.getElementById('dashboard-container');

    for (const [market, config] of Object.entries(data.markets)) {
        const card = document.createElement('div');
        card.className = 'market-card';
        
        // สร้างเนื้อหาในการ์ดแยก หน้า/หลัง
        card.innerHTML = `
            <h3>${market.toUpperCase()}</h3>
            <div class="split-view">
                <div class="pos-box ${getStatusClass(config.front.status)}">
                    <p class="pos-label">หลักหน้า (สิบ)</p>
                    <p class="bet-value">${config.front.bet_size}%</p>
                    <p class="pair-nums">เลข: ${config.front.pair.join('-')}</p>
                    <small>Confidence: ${config.front.score}/4</small>
                </div>
                
                <div class="pos-box ${getStatusClass(config.back.status)}">
                    <p class="pos-label">หลักหลัง (หน่วย)</p>
                    <p class="bet-value">${config.back.bet_size}%</p>
                    <p class="pair-nums">เลข: ${config.back.pair.join('-')}</p>
                    <small>Confidence: ${config.back.score}/4</small>
                </div>
            </div>
        `;
        container.appendChild(card);
    }
}

// ฟังก์ชันช่วยเลือกสี CSS
function getStatusClass(status) {
    if (status.includes("GREEN")) return "status-green";
    if (status.includes("YELLOW")) return "status-yellow";
    return "status-red";
}

loadDashboard();
</script>

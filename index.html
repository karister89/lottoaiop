<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign V3 - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .market-header { background: linear-gradient(90deg, #0f172a 0%, #1e3a8a 100%); }
        .stat-table { width: 100%; font-size: 0.65rem; border-collapse: collapse; margin-top: 8px; }
        .stat-table th { color: #94a3b8; font-weight: normal; padding: 4px 2px; border-bottom: 1px solid #334155; text-align: right; }
        .stat-table th:first-child { text-align: left; }
        .stat-table td { padding: 4px 2px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stat-table td:first-child { text-align: left; color: #cbd5e1; }
        .side-panel { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 8px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto mb-8">
        <h1 class="text-2xl md:text-3xl font-bold text-white mb-4">🚀 Sovereign V3 Command Center</h1>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="card p-4 border-l-4 border-green-500">
                <p class="text-slate-400 text-xs">NET PROFIT (30D)</p>
                <h2 id="total-profit" class="text-2xl font-bold text-green-400">กำลังคำนวณ...</h2>
            </div>
            <div class="card p-4 border-l-4 border-blue-500">
                <p class="text-slate-400 text-xs">AVG WIN-RATE (30D)</p>
                <h2 id="total-winrate" class="text-2xl font-bold">0%</h2>
            </div>
            <div class="card p-4 border-l-4 border-yellow-500">
                <p class="text-slate-400 text-xs">TOTAL INVESTED (30D)</p>
                <h2 id="total-invested" class="text-2xl font-bold text-slate-300">0 ฿</h2>
            </div>
            <div class="card p-4 border-l-4 border-purple-500">
                <p class="text-slate-400 text-xs">LAST SYNC</p>
                <h2 id="last-sync" class="text-sm font-bold mt-2 text-slate-300">--:--</h2>
            </div>
        </div>
    </div>

    <div id="market-list" class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
        </div>

    <script>
        const marketOrder = ["TPE", "NIKKEI", "SHE", "HANGSENG", "SENSEX", "DAX", "FTSE", "DJI"];

        // 🔻 ฟังก์ชันใหม่: คำนวณวันงวดถัดไป "อิงจากวันที่ล่าสุดของตลาดนั้นๆ" 🔻
        function getNextWorkingDate(lastDateStr) {
            // ถ้าไม่มีข้อมูลวันที่ส่งมาจากบอท ให้แสดงข้อความแจ้งเตือน
            if (!lastDateStr) return "รอข้อมูลวันที่";

            let d = new Date(lastDateStr);
            if (isNaN(d)) return "รูปแบบวันไม่ถูกต้อง";

            d.setDate(d.getDate() + 1); // บวกไป 1 วันจากผลล่าสุดของหุ้น
            if (d.getDay() === 6) d.setDate(d.getDate() + 2); // ถ้าบวกแล้วเป็นเสาร์ ให้เด้งไปจันทร์ (+2)
            if (d.getDay() === 0) d.setDate(d.getDate() + 1); // ถ้าบวกแล้วเป็นอาทิตย์ ให้เด้งไปจันทร์ (+1)
            
            return d.toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'2-digit'});
        }

        // ฟังก์ชันสร้างตารางสถิติย้อนหลัง
        function generateStatTable(history) {
            let rows = "";
            ["15d", "30d", "60d", "100d"].forEach(period => {
                const stat = history[period];
                if(stat) {
                    const color = stat.profit >= 0 ? "text-green-400" : "text-red-400";
                    const sign = stat.profit > 0 ? "+" : "";
                    rows += `
                        <tr>
                            <td>${period.replace('d', ' วัน')}</td>
                            <td class="font-bold ${color}">${sign}${stat.profit}฿</td>
                            <td class="text-blue-300 font-semibold">${stat.win_rate}%</td>
                        </tr>
                    `;
                }
            });
            return `
                <table class="stat-table">
                    <thead><tr><th>ระยะ</th><th>กำไร</th><th>โอกาส</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        async function initDashboard() {
            try {
                const res = await fetch('data/final_synergy.json'); 
                if (!res.ok) throw new Error("โหลดไฟล์ไม่สำเร็จ");
                const data = await res.json();

                const container = document.getElementById('market-list');
                container.innerHTML = '';
                
                // ข้อมูลภาพรวมจาก JSON
                if(data.portfolio && data.portfolio["30d"]) {
                    document.getElementById('total-profit').innerText = data.portfolio["30d"].profit.toLocaleString() + " ฿";
                    document.getElementById('total-invested').innerText = data.portfolio["30d"].invested.toLocaleString() + " ฿";
                    let totalWins = data.portfolio["30d"].wins;
                    let avgWinRate = (totalWins / (8 * 2 * 30) * 100).toFixed(1); 
                    document.getElementById('total-winrate').innerText = avgWinRate + "%";
                }
                
                marketOrder.forEach(mKey => {
                    const m = data.markets[mKey];
                    if (!m) return;

                    // 🔻 ส่งวันที่ล่าวสุดของตลาดนี้ (m.last_date) เข้าไปบวก 1 วัน 🔻
                    const nextDate = getNextWorkingDate(m.last_date);

                    const marketHTML = `
                        <div class="card overflow-hidden">
                            <div class="market-header p-3 border-b border-slate-700 flex justify-between items-center">
                                <span class="text-xl font-black text-white uppercase tracking-wider">${mKey}</span>
                                <span class="text-xs bg-indigo-600 px-3 py-1 rounded-full text-white font-bold shadow-md">
                                    งวดถัดไป: ${nextDate}
                                </span>
                            </div>
                            
                            <div class="grid grid-cols-2 p-3 gap-3">
                                
                                <div class="side-panel border-t-2 border-t-yellow-500">
                                    <div class="flex justify-between items-start mb-2">
                                        <div>
                                            <p class="text-[10px] text-slate-400 font-bold">รูดหน้า (FRONT)</p>
                                            <p class="text-3xl font-black text-yellow-400">${m.front.pair[0]},${m.front.pair[1]}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="text-[9px] text-slate-500">ลงทุน</p>
                                            <p class="text-sm font-bold ${m.front.bet_size > 0 ? 'text-white' : 'text-slate-500'}">${m.front.bet_size}%</p>
                                        </div>
                                    </div>
                                    ${generateStatTable(m.front.history)}
                                </div>

                                <div class="side-panel border-t-2 border-t-emerald-500">
                                    <div class="flex justify-between items-start mb-2">
                                        <div>
                                            <p class="text-[10px] text-slate-400 font-bold">รูดหลัง (BACK)</p>
                                            <p class="text-3xl font-black text-emerald-400">${m.back.pair[0]},${m.back.pair[1]}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="text-[9px] text-slate-500">ลงทุน</p>
                                            <p class="text-sm font-bold ${m.back.bet_size > 0 ? 'text-white' : 'text-slate-500'}">${m.back.bet_size}%</p>
                                        </div>
                                    </div>
                                    ${generateStatTable(m.back.history)}
                                </div>

                            </div>
                        </div>
                    `;
                    container.innerHTML += marketHTML;
                });

                document.getElementById('last-sync').innerText = new Date().toLocaleTimeString('th-TH');

            } catch (err) {
                console.error("Data fetch error:", err);
                document.getElementById('market-list').innerHTML = `<div class="col-span-full text-center p-4 text-red-500">โหลดข้อมูลไม่สำเร็จ: ตรวจสอบไฟล์ final_synergy.json</div>`;
            }
        }

        initDashboard();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign V3 - Next Round & Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .next-round-bg { background: linear-gradient(180deg, #1e3a8a 0%, #1e293b 100%); }
        .stat-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        .stat-table th { color: #94a3b8; font-weight: normal; padding: 4px; border-bottom: 1px solid #334155; }
        .stat-table td { padding: 6px 4px; text-align: center; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-7xl mx-auto mb-8">
        <h1 class="text-2xl font-bold text-white mb-4">🚀 Sovereign V3 Command Center</h1>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="card p-4 border-l-4 border-green-500">
                <p class="text-slate-400 text-[10px]">NET PROFIT (30D)</p>
                <h2 id="total-profit" class="text-xl font-bold">กำลังคำนวณ...</h2>
            </div>
            <div class="card p-4 border-l-4 border-blue-500">
                <p class="text-slate-400 text-[10px]">AVG WIN-RATE</p>
                <h2 id="total-winrate" class="text-xl font-bold">0%</h2>
            </div>
            <div class="card p-4 border-l-4 border-yellow-500">
                <p class="text-slate-400 text-[10px]">INVESTED</p>
                <h2 id="total-invested" class="text-xl font-bold text-slate-300">0 ฿</h2>
            </div>
            <div class="card p-4 border-l-4 border-purple-500">
                <p class="text-slate-400 text-[10px]">LAST UPDATE</p>
                <h2 id="last-sync" class="text-xs font-bold mt-2">--:--</h2>
            </div>
        </div>
    </div>

    <div id="market-list" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        </div>

    <script>
        const marketOrder = ["tpe", "nikkei", "she", "hangseng", "sensex", "dax", "ftse", "dji"];

        function getNextDate(lastUpdate) {
            let d = new Date(lastUpdate);
            if (isNaN(d)) return "N/A";
            d.setDate(d.getDate() + 1);
            if (d.getDay() === 6) d.setDate(d.getDate() + 2);
            if (d.getDay() === 0) d.setDate(d.getDate() + 1);
            return d.toLocaleDateString('th-TH', {day:'2-digit', month:'short'});
        }

        async function initDashboard() {
            try {
                const res = await fetch('data/final_synergy.json');
                const data = await res.json();
                const container = document.getElementById('market-list');
                
                let sumProfit = 0, sumInvest = 0, sumWins = 0;

                marketOrder.forEach(mKey => {
                    const m = data.markets[mKey];
                    if (!m) return;

                    const h = m.history;
                    sumProfit += h["30d"].profit;
                    sumInvest += h["30d"].invested;
                    sumWins += h["30d"].wins;

                    const marketHTML = `
                        <div class="card overflow-hidden">
                            <div class="next-round-bg p-4 border-b border-slate-700">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-lg font-black text-white uppercase">${mKey}</span>
                                    <span class="text-[10px] bg-blue-500 px-2 py-0.5 rounded text-white">งวด ${getNextDate(m.last_update)}</span>
                                </div>
                                <div class="text-center bg-black/30 py-3 rounded-lg border border-white/10">
                                    <p class="text-[10px] text-slate-400 mb-1">เลขเด่น Sniper 40 ชุด</p>
                                    <p class="text-3xl font-black text-yellow-400 tracking-tighter">
                                        ${m.pair[0]} <span class="text-white text-xl">,</span> ${m.pair[1]}
                                    </p>
                                </div>
                            </div>
                            
                            <div class="p-3">
                                <p class="text-[10px] text-slate-400 mb-2 font-bold uppercase tracking-wider">📊 สถิติย้อนหลัง 4 ระยะ</p>
                                <table class="stat-table">
                                    <thead>
                                        <tr>
                                            <th>ระยะ</th>
                                            <th>กำไร (฿)</th>
                                            <th>Win-Rate</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${["15d", "30d", "60d", "100d"].map(range => `
                                            <tr class="${range === '15d' ? 'bg-white/5' : ''}">
                                                <td class="text-slate-500">${range.replace('d',' วัน')}</td>
                                                <td class="font-bold ${h[range].profit >= 0 ? 'text-green-400' : 'text-red-400'}">
                                                    ${h[range].profit > 0 ? '+' : ''}${h[range].profit}
                                                </td>
                                                <td class="text-blue-300 font-semibold">${h[range].win_rate}%</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                    container.innerHTML += marketHTML;
                });

                // อัปเดต Summary ด้านบน
                document.getElementById('total-profit').innerText = sumProfit.toLocaleString() + " ฿";
                document.getElementById('total-profit').classList.add(sumProfit >= 0 ? 'text-green-400' : 'text-red-400');
                document.getElementById('total-winrate').innerText = (sumWins / (marketOrder.length * 30) * 100).toFixed(1) + "%";
                document.getElementById('total-invested').innerText = sumInvest.toLocaleString() + " ฿";
                document.getElementById('last-sync').innerText = new Date().toLocaleTimeString('th-TH');

            } catch (err) {
                console.error("Data fetch error:", err);
            }
        }

        initDashboard();
    </script>
</body>
</html>
